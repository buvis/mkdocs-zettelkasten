---
name: Build & Release PyPI Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build and inspect package
        uses: hynek/build-and-inspect-python-package@v2
        with:
          attest-build-provenance-github: "true"

  release-pypi:
    name: Publish released package to PyPI
    environment: release-pypi
    runs-on: ubuntu-latest
    needs: build-package
    if: github.event.action == 'published' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download built package
        uses: actions/download-artifact@v7
        with:
          name: Packages
          path: dist

      - name: Get version from built package
        id: get_version
        run: |
          VERSION=$(ls dist/*.whl | head -1 | sed 's/.*-\([0-9][^-]*\)-.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version exists on PyPI
        id: version_check
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PKG="mkdocs-zettelkasten"
          if curl -fsS "https://pypi.org/pypi/$PKG/json" | jq -e ".releases | has(\"$VERSION\")" > /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        if: steps.version_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Version exists in PyPI
        if: steps.version_check.outputs.exists == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            core.setFailed('This version was already published to PyPI!')

      - name: Clean up local build artifacts
        if: always()
        run: rm -rf dist/*

      - name: Delete all workflow artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v5
