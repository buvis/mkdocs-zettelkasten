---
name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Build package
        run: uv build

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: packages
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ (contains(github.ref_name, 'rc') || inputs.testpypi) && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          repository-url: ${{ (contains(github.ref_name, 'rc') || inputs.testpypi) && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}

  github-release:
    needs: [build, publish]
    if: github.event_name == 'push' && !contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages
          path: dist/

      - name: Generate changelog
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          version="${tag#v}"
          date=$(git log -1 --format=%cs "$tag")
          prev_tag=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          range="${prev_tag:+$prev_tag..}$tag"
          repo="${{ github.repository }}"

          pkg_name=$(sed -n 's/^name = "\(.*\)"/\1/p' pyproject.toml)
          echo "# ${pkg_name} $version ($date)" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          echo "VERSION=$version" >> "$GITHUB_ENV"

          declare -A sections=(
            [feat]="Features"
            [fix]="Bug Fixes"
            [perf]="Performance"
            [refactor]="Refactoring"
            [build]="Build"
            [ops]="Operations"
            [docs]="Documentation"
            [test]="Tests"
            [style]="Style"
            [chore]="Chores"
          )
          order="feat fix perf refactor build ops docs test style chore"
          scope_re='([^)]+)'

          for type in $order; do
            heading="${sections[$type]}"
            entries=""
            while IFS='|' read -r hash msg; do
              [ -z "$hash" ] && continue
              [[ "$msg" =~ ^build.*:\ bump ]] && continue
              body="${msg#*: }"
              scope=""
              if [[ "$msg" =~ ^${type}\(${scope_re}\) ]]; then
                scope="${BASH_REMATCH[1]}"
              fi
              if [ -n "$scope" ]; then
                entries+="- **${scope}**: ${body}"$'\n'
              else
                entries+="- ${body}"$'\n'
              fi
              entries+="  ([\`${hash}\`](https://github.com/${repo}/commit/${hash}))"$'\n\n'
            done < <(git log "$range" --no-merges --pretty="tformat:%h|%s" --grep="^${type}[:(!]" --extended-regexp)

            if [ -n "$entries" ]; then
              {
                echo "## $heading"
                echo ""
                printf '%s' "$entries"
              } >> CHANGELOG.md
            fi
          done

      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.VERSION }}
          body_path: CHANGELOG.md
          files: dist/*
