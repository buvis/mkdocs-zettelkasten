---
name: Build and upload pre-release PyPI package

on:
  push:
    branches: ["feature/*", "develop"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release-test-pypi

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Get version from built package
        id: get_version
        run: |
          VERSION=$(ls dist/*.whl | head -1 | sed 's/.*-\([0-9][^-]*\)-.*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if version exists on Test PyPI
        id: version_check
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PKG="mkdocs-zettelkasten"
          if curl -fsS "https://test.pypi.org/pypi/$PKG/json" | jq -e ".releases | has(\"$VERSION\")" > /dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to Test PyPI
        if: steps.version_check.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: false
          verbose: true

      - name: Verify installation from Test PyPI
        if: steps.version_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          for i in 1 2 3 4 5; do
            echo "Attempt $i: installing mkdocs-zettelkasten==$VERSION"
            if pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple "mkdocs-zettelkasten==$VERSION"; then
              echo "Installation succeeded"
              exit 0
            fi
            echo "Not available yet, waiting 15s..."
            sleep 15
          done
          echo "Package not available after 5 attempts"
          exit 1
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1

      - name: Version exists in PyPI
        if: steps.version_check.outputs.exists == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            core.setFailed('This version was already published to PyPI!')

      - name: Clean up local build artifacts
        if: always()
        run: rm -rf dist/*

      - name: Delete all workflow artifacts
        if: always()
        uses: geekyeggo/delete-artifact@f275313e70c08f6120db482d7a6b98377786765b # v5
