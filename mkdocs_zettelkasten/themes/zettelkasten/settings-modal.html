<dialog id="mkdocs_settings_modal" class="modal-lg" aria-labelledby="settingsModalLabel">
    <div class="modal-header">
        <h4 class="modal-title" id="settingsModalLabel">{% trans %}Settings{% endtrans %}</h4>
        <button type="button" class="modal-close" aria-label="Close"><span aria-hidden="true">&times;</span><span class="visually-hidden">Close</span></button>
    </div>
    <div class="modal-body">
                <div class="settings-section-header">
                    <h5>Color Scheme</h5>
                    <div class="dark-mode-toggle-group">
                        <span class="toggle-label">Light</span>
                        <label class="dark-mode-toggle" title="Toggle dark mode">
                            <input type="checkbox" id="dark-mode-toggle">
                            <span class="toggle-track">
                                <span class="toggle-icon toggle-sun">&#9788;</span>
                                <span class="toggle-icon toggle-moon">&#9789;</span>
                                <span class="toggle-thumb"></span>
                            </span>
                        </label>
                        <span class="toggle-label">Dark</span>
                    </div>
                </div>
                <div id="scheme-grid" class="scheme-grid"></div>

                <h5 style="margin-top: 1.5em;">Code Theme</h5>
                <div class="form-group">
                    <label for="hljs-theme-select">Syntax highlighting theme</label>
                    <select id="hljs-theme-select" class="form-control">
                        <option value="github">GitHub</option>
                        <option value="github-dark">GitHub Dark</option>
                        <option value="monokai">Monokai</option>
                        <option value="solarized-light">Solarized Light</option>
                        <option value="solarized-dark">Solarized Dark</option>
                        <option value="nord">Nord</option>
                        <option value="atom-one-light">Atom One Light</option>
                        <option value="atom-one-dark">Atom One Dark</option>
                        <option value="dracula">Dracula</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="tokyo-night-dark">Tokyo Night Dark</option>
                        <option value="tokyo-night-light">Tokyo Night Light</option>
                        <option value="a11y-light">A11y Light</option>
                        <option value="a11y-dark">A11y Dark</option>
                        <option value="base16/catppuccin-latte">Catppuccin Latte</option>
                        <option value="base16/catppuccin-mocha">Catppuccin Mocha</option>
                        <option value="base16/rose-pine">Rose Pine</option>
                        <option value="base16/rose-pine-dawn">Rose Pine Dawn</option>
                        <option value="base16/everforest">Everforest</option>
                        <option value="base16/kanagawa">Kanagawa</option>
                        <option value="base16/material">Material</option>
                        <option value="base16/material-lighter">Material Lighter</option>
                        <option value="base16/nord">Nord (base16)</option>
                        <option value="base16/papercolor-light">PaperColor Light</option>
                        <option value="base16/papercolor-dark">PaperColor Dark</option>
                        <option value="base16/zenburn">Zenburn</option>
                        <option value="eink-light">E-ink Light</option>
                        <option value="eink-dark">E-ink Dark</option>
                    </select>
                </div>
                <pre id="hljs-preview" class="hljs-preview"><code class="language-python">def greet(name: str) -> str:
    """Return a greeting message."""
    if not name:
        return "Hello, World!"
    return f"Hello, {name}!"

# Example usage
print(greet("Zettelkasten"))</code></pre>
            </div>
    <div class="modal-footer">
    </div>
</dialog>
